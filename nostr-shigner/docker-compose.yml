version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: nostr-shigner_web_1
      APP_PORT: 28088

  web:
    image: ghcr.io/jiyuworld/nostr-shigner-umbrel:v0.1.0-beta-0.0.1
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      PORT: 28088
      NOSTR_SHIGNER_DATA_DIR: /data/.nostr-shigner
